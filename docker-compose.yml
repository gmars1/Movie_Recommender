version: '3.8'

services:
  movie_db:
    image: postgres:17-alpine
    container_name: movie_db
    environment:
      POSTGRES_USER: ${DB_FILMS_USER}
      POSTGRES_PASSWORD: ${DB_FILMS_PASSWORD}
      POSTGRES_DB: ${DB_FILMS_NAME}
    ports:
      - "${DB_FILMS_PORT}:${DB_FILMS_CONTAINER_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - film_network
  
  backend: # Новый сервис для Django приложения
    build:
      context: .
      dockerfile: ./backend/Dockerfile # Используем новый Dockerfile для Django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app # Для live-reload кода Django в разработке
    ports:
      - "8000:8000" # Проброс порта Django
    environment:
      DB_FILMS_USER: ${DB_FILMS_USER}
      DB_FILMS_PASSWORD: ${DB_FILMS_PASSWORD}
      DB_FILMS_NAME: ${DB_FILMS_NAME}
      DB_FILMS_HOST: movie_db # Имя сервиса БД внутри Docker сети
      DB_FILMS_PORT: ${DB_FILMS_CONTAINER_PORT} # Внутренний порт контейнера БД
      DJANGO_SETTINGS_MODULE: core.settings # Путь к настройкам Django
    depends_on:
      movie_db: # Зависит от готовности БД
        condition: service_healthy
      movie_db_migrator: # Должен ждать выполнения Django миграций
        condition: service_completed_successfully
      movie_db_seed: # todo Должен ждать seed?
        condition: service_completed_successfully
    networks:
      - film_network
  
  movie_db_migrator:
    build:
      context: .
      dockerfile: ./backend/Dockerfile      # СТАЛО: используется Dockerfile от Django
    command: python manage.py migrate         # СТАЛО: команда для Django миграций
    environment:
      DB_FILMS_USER: ${DB_FILMS_USER}
      DB_FILMS_PASSWORD: ${DB_FILMS_PASSWORD}
      DB_FILMS_NAME: ${DB_FILMS_NAME}
      DB_FILMS_HOST: movie_db
      DB_FILMS_PORT: ${DB_FILMS_CONTAINER_PORT}
      DJANGO_SETTINGS_MODULE: core.settings # Путь к настройкам Django
    depends_on:
      movie_db:
        condition: service_healthy
    networks:
      - film_network
  
  movie_db_seed:
    build:
      context: .
      dockerfile: ./backend/filmsDBDataFiller/Dockerfile
    environment:
      DB_FILMS_USER: ${DB_FILMS_USER}
      DB_FILMS_PASSWORD: ${DB_FILMS_PASSWORD}
      DB_FILMS_NAME: ${DB_FILMS_NAME}
      DB_FILMS_HOST: movie_db
      DB_FILMS_PORT: ${DB_FILMS_CONTAINER_PORT}
    depends_on:
      movie_db_migrator: # Сидер должен ждать, пока Django применит миграции
        condition: service_started
    networks:
      - film_network



networks:
  film_network:
    driver: bridge
