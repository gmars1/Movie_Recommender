{% extends "base_generic.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="p-4 rounded" style="background-color: #1e1e1e; border: 1px solid #2d2d2d;">
        <h2 class="text-center mb-4">Регистрация</h2>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }} {# as_p уже добавляет <p> теги, стили для input применятся из base_generic #}
          <button type="submit" class="btn btn-primary-custom w-100 mt-3">Зарегистрироваться</button>
        </form>
        <p class="mt-3 text-center">
          Уже есть аккаунт? <a href="{% url 'login' %}" class="link-light">Войти</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
