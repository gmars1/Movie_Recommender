<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фильмы</title>
</head>
<body>
    <h1>Список фильмов</h1>
    <ul>
        {% for movie in movies %}
            <li>{{ movie.title }} ({{ movie.year }}) — рейтинг: {{ movie.rating }}</li>
        {% empty %}
            <li>Нет фильмов</li>
        {% endfor %}
    </ul>
</body>
</html>
